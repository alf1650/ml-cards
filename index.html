<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>MLBB Card Collection</title>
  <meta name="description" content="Browse the Singapore Miles & Lifestyle credit card collection with rates, perks, and miles values." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://alf1650.github.io/ml-cards/" />
  <meta property="og:title" content="MLBB Card Collection" />
  <meta property="og:description" content="Browse the Singapore Miles & Lifestyle credit card collection with rates, perks, and miles values." />
  <meta property="og:image" content="https://alf1650.github.io/ml-cards/og-image.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta name="twitter:card" content="summary_large_image" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:      #07080f;
      --bg2:     #0d0f1c;
      --surface: #111425;
      --surf2:   #161a2e;
      --border:  rgba(255,255,255,0.07);
      --border2: rgba(255,255,255,0.12);
      --text:    #eaedf8;
      --muted:   #5a6080;
      --accent:  #e8a930;
      --C:  #8892aa; --R:  #4b9fff; --RS: #9b6df0;
      --SSR:#ff6b35; --UR: #f5c842; --SP: #ff4b8b;
      --AR: #00e5c8; --QR: #ff80c8; --TR: #66bb6a;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bot: env(safe-area-inset-bottom, 0px);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', system-ui, sans-serif;
      min-height: 100dvh;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }
    body::before, body::after {
      content: '';
      position: fixed;
      border-radius: 50%;
      filter: blur(120px);
      pointer-events: none;
      z-index: 0;
    }
    body::before {
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(228,169,48,0.07) 0%, transparent 70%);
      top: -200px; right: -150px;
    }
    body::after {
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(75,159,255,0.06) 0%, transparent 70%);
      bottom: -150px; left: -100px;
    }

    /* ── Hero Banner ── */
    .hero-banner {
      position: relative;
      z-index: 1;
      padding: calc(var(--safe-top) + 32px) 24px 28px;
      text-align: center;
      background: linear-gradient(180deg, rgba(228,169,48,0.06) 0%, transparent 100%);
      border-bottom: 1px solid var(--border);
    }
    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(228,169,48,0.12);
      border: 1px solid rgba(228,169,48,0.25);
      border-radius: 100px;
      padding: 5px 14px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 14px;
    }
    .hero-badge .dot {
      width: 6px; height: 6px;
      background: var(--accent);
      border-radius: 50%;
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%,100% { opacity:1; transform:scale(1); }
      50%      { opacity:0.5; transform:scale(0.7); }
    }
    .hero-title {
      font-size: clamp(28px, 8vw, 44px);
      font-weight: 900;
      letter-spacing: -1.5px;
      background: linear-gradient(135deg, #fff 30%, var(--accent) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1.05;
    }
    .hero-sub {
      margin-top: 8px;
      font-size: 13px;
      color: var(--muted);
    }
    .hero-stats {
      display: flex;
      justify-content: center;
      margin-top: 22px;
      border-top: 1px solid var(--border);
      padding-top: 20px;
    }
    .stat { padding: 0 20px; border-right: 1px solid var(--border); }
    .stat:last-child { border-right: none; }
    .stat-val { font-size: 22px; font-weight: 800; color: var(--accent); }
    .stat-label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.8px; color: var(--muted); margin-top: 3px; }
    .hero-updated { font-size: 11px; color: var(--muted); margin-top: 6px; opacity: 0.75; }

    /* ── Controls ── */
    .controls {
      position: sticky; top: 0; z-index: 20;
      padding: 12px 16px;
      background: rgba(7,8,15,0.88);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      display: flex; flex-direction: column; gap: 10px;
    }
    .search-wrap { position: relative; }
    .search-icon {
      position: absolute; left: 14px; top: 50%;
      transform: translateY(-50%);
      color: var(--muted); pointer-events: none; display: flex;
    }
    #search {
      width: 100%;
      padding: 12px 14px 12px 42px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      font-size: 15px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    #search:focus {
      border-color: rgba(228,169,48,0.45);
      box-shadow: 0 0 0 3px rgba(228,169,48,0.09);
    }
    #search::placeholder { color: var(--muted); }

    .filter-scroll {
      display: flex; gap: 7px;
      overflow-x: auto; -webkit-overflow-scrolling: touch;
      scrollbar-width: none; padding-bottom: 2px;
    }
    .filter-scroll::-webkit-scrollbar { display: none; }
    .pill {
      flex-shrink: 0;
      padding: 7px 15px;
      border-radius: 100px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      font-size: 12px; font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.18s;
      white-space: nowrap;
    }
    .pill:hover { border-color: var(--border2); color: var(--text); }
    .pill.active[data-rarity="all"] { background:var(--text);  border-color:var(--text);  color:#07080f; }
    .pill.active[data-sort="price"] { background:var(--accent); border-color:var(--accent); color:#07080f; }
    .pill.active[data-sort="views"] { background:#ff6b35; border-color:#ff6b35; color:#fff; }
    .pill.active[data-rarity="C"]   { background:var(--C);    border-color:var(--C);    color:#07080f; }
    .pill.active[data-rarity="R"]   { background:var(--R);    border-color:var(--R);    color:#fff; }
    .pill.active[data-rarity="RS"]  { background:var(--RS);   border-color:var(--RS);   color:#fff; }
    .pill.active[data-rarity="SSR"] { background:var(--SSR);  border-color:var(--SSR);  color:#fff; }
    .pill.active[data-rarity="UR"]  { background:var(--UR);   border-color:var(--UR);   color:#07080f; }
    .pill.active[data-rarity="SP"]  { background:var(--SP);   border-color:var(--SP);   color:#fff; }
    .pill.active[data-rarity="AR"]  { background:var(--AR);   border-color:var(--AR);   color:#07080f; }
    .pill.active[data-rarity="QR"]  { background:var(--QR);   border-color:var(--QR);   color:#07080f; }
    .pill.active[data-rarity="TR"]  { background:var(--TR);   border-color:var(--TR);   color:#07080f; }

    /* ── Result bar ── */
    .result-bar {
      position: relative; z-index: 1;
      padding: 10px 18px;
      font-size: 12px; color: var(--muted); font-weight: 500;
    }

    /* ── Grid ── */
    .grid {
      position: relative; z-index: 1;
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      padding: 4px 12px calc(var(--safe-bot) + 32px);
    }
    @media (min-width: 480px)  { .grid { grid-template-columns: repeat(3,1fr); } }
    @media (min-width: 700px)  { .grid { grid-template-columns: repeat(4,1fr); gap:18px; padding:8px 24px 40px; } }
    @media (min-width: 960px)  { .grid { grid-template-columns: repeat(5,1fr); } }
    @media (min-width: 1200px) { .grid { grid-template-columns: repeat(6,1fr); } }

    /* ── Card ── */
    .card {
      position: relative;
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid var(--border);
      cursor: pointer;
      transition: transform 0.28s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.28s, border-color 0.28s;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }
    .card:hover, .card:focus-visible { outline:none; transform: translateY(-8px) scale(1.03); }
    .card[data-rarity="C"]:hover   { border-color:var(--C);   box-shadow:0 20px 48px -8px rgba(136,146,170,0.3); }
    .card[data-rarity="R"]:hover   { border-color:var(--R);   box-shadow:0 20px 48px -8px rgba(75,159,255,0.35); }
    .card[data-rarity="RS"]:hover  { border-color:var(--RS);  box-shadow:0 20px 48px -8px rgba(155,109,240,0.35); }
    .card[data-rarity="SSR"]:hover { border-color:var(--SSR); box-shadow:0 20px 48px -8px rgba(255,107,53,0.35); }
    .card[data-rarity="UR"]:hover  { border-color:var(--UR);  box-shadow:0 20px 48px -8px rgba(245,200,66,0.4); }
    .card[data-rarity="SP"]:hover  { border-color:var(--SP);  box-shadow:0 20px 48px -8px rgba(255,75,139,0.35); }
    .card[data-rarity="AR"]:hover  { border-color:var(--AR);  box-shadow:0 20px 48px -8px rgba(0,229,200,0.3); }
    .card[data-rarity="QR"]:hover  { border-color:var(--QR);  box-shadow:0 20px 48px -8px rgba(255,128,200,0.3); }
    .card[data-rarity="TR"]:hover  { border-color:var(--TR);  box-shadow:0 20px 48px -8px rgba(102,187,106,0.3); }

    .card-img {
      position: relative;
      aspect-ratio: 3/4;
      overflow: hidden;
    }
    .card-img img {
      width:100%; height:100%;
      object-fit: cover; display: block;
      transition: transform 0.45s ease;
    }
    .card:hover .card-img img { transform: scale(1.1); }
    .card-img::after {
      content:'';
      position:absolute; inset:0;
      background: linear-gradient(to top, rgba(7,8,15,0.93) 0%, rgba(7,8,15,0.15) 48%, transparent 100%);
      pointer-events:none;
    }

    .rarity-pill {
      position:absolute; top:10px; left:10px; z-index:2;
      padding:3px 9px; border-radius:100px;
      font-size:10px; font-weight:800; letter-spacing:0.6px; text-transform:uppercase;
    }
    .rarity-C   { background:var(--C);   color:#07080f; }
    .rarity-R   { background:var(--R);   color:#fff; }
    .rarity-RS  { background:var(--RS);  color:#fff; }
    .rarity-SSR { background:var(--SSR); color:#fff; }
    .rarity-UR  {
      background: linear-gradient(90deg,#f5c842,#ffe97a,#f5c842);
      background-size:200% 100%;
      animation: shimmer 2s linear infinite;
      color:#07080f;
    }
    .rarity-SP  { background:var(--SP);  color:#fff; }
    .rarity-AR  { background:var(--AR);  color:#07080f; }
    .rarity-QR  { background:var(--QR);  color:#07080f; }
    .rarity-TR  { background:var(--TR);  color:#07080f; }
    @keyframes shimmer {
      0%   { background-position:-100% 0; }
      100% { background-position: 100% 0; }
    }

    .card-label {
      position:absolute; bottom:0; left:0; right:0; z-index:2;
      padding:10px 12px 13px;
    }
    .card-skin {
      font-size:13px; font-weight:700; color:#fff;
      white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    }
    .card-id { font-size:10px; color:rgba(255,255,255,0.38); margin-top:2px; }
    .card-price { font-size:12px; font-weight:700; color:#4caf50; margin-top:3px; }

    /* ── Empty ── */
    .empty { grid-column:1/-1; text-align:center; padding:80px 24px; color:var(--muted); }
    .empty-icon { font-size:48px; margin-bottom:16px; opacity:0.35; }
    .empty p { font-size:15px; }

    /* ── Backdrop ── */
    .backdrop {
      display:none; position:fixed; inset:0; z-index:100;
      background:rgba(0,0,0,0.78);
      backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px);
      align-items:flex-end; justify-content:center;
    }
    @media (min-width:600px) { .backdrop { align-items:center; padding:24px; } }
    .backdrop.open { display:flex; }

    /* ── Sheet (bottom sheet on mobile, modal on desktop) ── */
    .sheet {
      background: var(--surface);
      border-radius: 24px 24px 0 0;
      width: 100%;
      max-height: 92dvh;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior: contain;
      position: relative;
      animation: slideUp 0.3s cubic-bezier(0.34,1.56,0.64,1);
    }
    @media (min-width:600px) {
      .sheet { border-radius:24px; max-width:460px; animation:popIn 0.25s cubic-bezier(0.34,1.56,0.64,1); }
    }
    @keyframes slideUp {
      from { transform:translateY(100%); opacity:0; }
      to   { transform:translateY(0);    opacity:1; }
    }
    @keyframes popIn {
      from { transform:scale(0.9); opacity:0; }
      to   { transform:scale(1);   opacity:1; }
    }

    .drag-handle {
      height:28px; display:flex; align-items:center; justify-content:center;
    }
    .drag-handle::before {
      content:''; width:36px; height:4px;
      background:rgba(255,255,255,0.14); border-radius:2px;
    }
    @media (min-width:600px) { .drag-handle { display:none; } }

    .sheet-img-wrap {
      position:relative; aspect-ratio:3/4;
      max-height:46dvh; overflow:hidden;
    }
    @media (min-width:600px) { .sheet-img-wrap { max-height:52vh; } }
    .sheet-img-wrap img { width:100%; height:100%; object-fit:cover; display:block; }
    .sheet-img-wrap::after {
      content:''; position:absolute; inset:0;
      background:linear-gradient(to top,var(--surface) 0%,transparent 55%);
      pointer-events:none;
    }
    .sheet-line { position:absolute; bottom:0; left:0; right:0; height:3px; z-index:2; }

    .sheet-close {
      position:absolute; top:14px; right:14px; z-index:10;
      width:34px; height:34px; border-radius:50%;
      background:rgba(0,0,0,0.55);
      border:1px solid rgba(255,255,255,0.1);
      color:#fff; font-size:15px; cursor:pointer;
      display:flex; align-items:center; justify-content:center;
      backdrop-filter:blur(8px);
      transition:background 0.2s;
    }
    .sheet-close:hover { background:rgba(255,255,255,0.15); }

    .sheet-body { padding:0 20px calc(var(--safe-bot) + 28px); }

    .sheet-rarity-badge {
      display:inline-flex; align-items:center;
      padding:5px 13px; border-radius:100px;
      font-size:11px; font-weight:800; letter-spacing:0.5px;
      margin-bottom:10px;
    }
    .sheet-hero {
      font-size:clamp(26px,6vw,36px);
      font-weight:900; letter-spacing:-0.5px;
      color:var(--text); line-height:1.05;
    }
    .sheet-skin { font-size:15px; color:var(--muted); margin-top:4px; font-weight:500; }
    .sheet-divider { height:1px; background:var(--border); margin:18px 0; }

    .sheet-meta { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
    .meta-tile {
      background:var(--surf2); border:1px solid var(--border);
      border-radius:14px; padding:13px 15px;
    }
    .meta-tile.full { grid-column:1/-1; }
    .tile-label {
      font-size:10px; font-weight:700; text-transform:uppercase;
      letter-spacing:0.9px; color:var(--muted); margin-bottom:5px;
    }
    .tile-val { font-size:14px; font-weight:700; color:var(--text); }

    /* ── Tab bar ── */
    .tab-bar {
      position: relative; z-index: 1;
      display: flex;
      border-bottom: 1px solid var(--border);
      background: var(--bg2);
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    .tab-bar::-webkit-scrollbar { display: none; }
    .tab-btn {
      flex: 1 0 0;
      min-width: 110px;
      padding: 14px 16px;
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      color: var(--muted);
      font-family: inherit;
      font-size: 13px; font-weight: 700;
      white-space: nowrap;
      cursor: pointer;
      transition: all 0.18s;
      letter-spacing: 0.3px;
    }
    @media (max-width: 420px) {
      .tab-btn {
        font-size: 12px;
        min-width: 104px;
        padding: 12px 12px;
      }
      .live-header { padding: 14px 14px 8px; }
      .live-refresh-bar { padding: 8px 14px 0; }
      .live-grid { padding-left: 10px; padding-right: 10px; }
    }
    .tab-btn:hover { color: var(--text); }
    .tab-btn.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }

    /* ── Leaderboard ── */
    #leaderboardView { display: none; position: relative; z-index: 1; }
    #leaderboardView.visible { display: block; }
    .lb-header {
      padding: 20px 18px 10px;
      font-size: 11px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 1px;
      color: var(--muted);
    }
    .lb-list { padding: 0 12px calc(var(--safe-bot) + 32px); display: flex; flex-direction: column; gap: 8px; }
    .lb-row {
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 10px 14px 10px 10px;
      cursor: pointer;
      transition: border-color 0.18s, transform 0.18s, box-shadow 0.18s;
      -webkit-tap-highlight-color: transparent;
    }
    .lb-row:hover { transform: translateX(4px); }
    .lb-row[data-rarity="C"]:hover  { border-color:var(--C);   box-shadow:0 4px 20px -4px rgba(136,146,170,0.25); }
    .lb-row[data-rarity="R"]:hover  { border-color:var(--R);   box-shadow:0 4px 20px -4px rgba(75,159,255,0.3); }
    .lb-row[data-rarity="RS"]:hover { border-color:var(--RS);  box-shadow:0 4px 20px -4px rgba(155,109,240,0.3); }
    .lb-row[data-rarity="SSR"]:hover{ border-color:var(--SSR); box-shadow:0 4px 20px -4px rgba(255,107,53,0.3); }
    .lb-row[data-rarity="UR"]:hover { border-color:var(--UR);  box-shadow:0 4px 20px -4px rgba(245,200,66,0.35); }
    .lb-row[data-rarity="SP"]:hover { border-color:var(--SP);  box-shadow:0 4px 20px -4px rgba(255,75,139,0.3); }
    .lb-row[data-rarity="AR"]:hover { border-color:var(--AR);  box-shadow:0 4px 20px -4px rgba(0,229,200,0.25); }
    .lb-row[data-rarity="QR"]:hover { border-color:var(--QR);  box-shadow:0 4px 20px -4px rgba(255,128,200,0.25); }
    .lb-row[data-rarity="TR"]:hover { border-color:var(--TR);  box-shadow:0 4px 20px -4px rgba(102,187,106,0.25); }
    .lb-rank {
      width: 28px; text-align: center; flex-shrink: 0;
      font-size: 15px; font-weight: 900; color: var(--muted);
    }
    .lb-rank.top1 { color: #f5c842; font-size: 20px; }
    .lb-rank.top2 { color: #9bb0c4; font-size: 18px; }
    .lb-rank.top3 { color: #cd7f32; font-size: 17px; }
    .lb-thumb {
      width: 52px; height: 70px; flex-shrink: 0;
      border-radius: 10px; overflow: hidden;
      border: 1px solid var(--border);
    }
    .lb-thumb img { width:100%; height:100%; object-fit:cover; display:block; }
    .lb-info { flex: 1; min-width: 0; }
    .lb-skin {
      font-size: 14px; font-weight: 700; color: var(--text);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .lb-hero { font-size: 11px; color: var(--muted); margin-top: 2px; }
    .lb-rarity-dot {
      display: inline-block;
      width: 8px; height: 8px; border-radius: 50%;
      margin-right: 5px; vertical-align: middle;
    }
    .lb-right { flex-shrink: 0; text-align: right; }
    .lb-count {
      font-size: 20px; font-weight: 900; color: var(--text);
      line-height: 1;
    }
    .lb-count-label {
      font-size: 9px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.8px; color: var(--muted); margin-top: 2px;
    }
    .lb-bar-wrap {
      margin-top: 6px;
      height: 3px; background: var(--border);
      border-radius: 2px; overflow: hidden;
    }
    .lb-bar { height: 100%; border-radius: 2px; transition: width 0.6s ease; }
    .lb-empty {
      text-align: center; padding: 80px 24px; color: var(--muted);
    }
    .lb-empty-icon { font-size: 48px; margin-bottom: 16px; opacity: 0.35; }

    /* ── View badge ── */
    .view-badge {
      position:absolute; bottom:10px; right:10px; z-index:3;
      display:flex; align-items:center; gap:4px;
      background:rgba(0,0,0,0.62);
      border:1px solid rgba(255,255,255,0.12);
      border-radius:100px;
      padding:3px 8px;
      font-size:10px; font-weight:700; color:rgba(255,255,255,0.7);
      backdrop-filter:blur(6px);
      pointer-events:none;
    }

    /* ── Live tab ── */
    #liveView { display:none; position:relative; z-index:1; }
    #liveView.visible { display:block; }
    .live-header {
      padding: 20px 18px 10px;
      font-size: 11px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 1px;
      color: var(--muted);
    }
    .live-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 9px;
      padding: 2px 12px calc(var(--safe-bot) + 26px);
    }
    @media (min-width: 480px)  { .live-grid { grid-template-columns: repeat(3,1fr); } }
    @media (min-width: 700px)  { .live-grid { grid-template-columns: repeat(4,1fr); gap:12px; padding:6px 20px 30px; } }
    @media (min-width: 960px)  { .live-grid { grid-template-columns: repeat(5,1fr); gap:14px; } }
    .tt-tile {
      display: flex; flex-direction: column;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      transition: transform 0.28s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.28s, border-color 0.28s;
      -webkit-tap-highlight-color: transparent;
    }
    .tt-tile:hover { transform: translateY(-6px) scale(1.03); border-color: var(--border2); box-shadow: 0 16px 40px -8px rgba(0,0,0,0.5); }
    .tt-tile a { text-decoration: none; color: inherit; display: flex; flex-direction: column; height: 100%; padding: 12px 12px 11px; }
    .tt-avatar {
      width: 42px; height: 42px;
      border-radius: 50%;
      background: var(--surf2);
      border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
      margin-bottom: 8px; flex-shrink: 0;
    }
    .tt-name {
      font-size: 12px; font-weight: 700; color: var(--text);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      margin-bottom: 2px;
    }
    .tt-flag { font-size: 11px; font-weight: 400; opacity: 0.85; }
    .tt-handle {
      font-size: 10px; color: var(--muted);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      margin-bottom: 8px;
    }
    .tt-status { margin-top: auto; }
    .live-badge {
      display: inline-flex; align-items: center; gap: 6px;
      background: rgba(255,59,48,0.15);
      border: 1px solid rgba(255,59,48,0.4);
      border-radius: 100px;
      padding: 5px 12px;
      font-size: 11px; font-weight: 800; letter-spacing: 0.8px;
      text-transform: uppercase; color: #ff3b30;
    }
    .live-badge .dot {
      width: 7px; height: 7px;
      background: #ff3b30; border-radius: 50%;
      animation: pulse 1.2s ease-in-out infinite;
    }
    .offline-badge {
      display: inline-flex; align-items: center; gap: 6px;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 100px;
      padding: 5px 12px;
      font-size: 11px; font-weight: 700; color: var(--muted);
    }
    .unknown-badge {
      display: inline-flex; align-items: center; gap: 6px;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 100px;
      padding: 5px 12px;
      font-size: 11px; font-weight: 700; color: var(--muted);
      opacity: 0.6;
    }
    .live-refresh-bar {
      padding: 10px 18px 0;
      font-size: 11px; color: var(--muted);
    }
  </style>
</head>
<body>

<header class="hero-banner">
  <div class="hero-badge"><span class="dot"></span>Mobile Legends: Bang Bang</div>
  <h1 class="hero-title">MLBB Card Collection</h1>
  <p class="hero-sub">All Series · Prices in USD</p>
  <p class="hero-updated" id="heroUpdated"></p>
  <div class="hero-stats">
    <div class="stat"><div class="stat-val" id="statCards">0</div><div class="stat-label">Cards</div></div>
    <div class="stat"><div class="stat-val" id="statRarities">0</div><div class="stat-label">Rarities</div></div>
    <div class="stat"><div class="stat-val" id="statHeroes">0</div><div class="stat-label">Heroes</div></div>
  </div>
</header>

<nav class="tab-bar">
  <button class="tab-btn active" id="tabLive">🔴 TikTok Live</button>
  <button class="tab-btn" id="tabCollection">📦 Collection</button>
  <button class="tab-btn" id="tabLeaderboard">🏆 Top Cards</button>
</nav>

<div id="liveView">
  <div class="live-header">TikTok live status · refreshes every 2 min</div>
  <div class="live-refresh-bar" id="liveRefreshBar"></div>
  <div class="live-grid" id="liveGrid"></div>
</div>

<div id="collectionView">
<div class="controls">
  <div class="search-wrap">
    <span class="search-icon">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
    </span>
    <input id="search" type="text" placeholder="Search skin or card ID…" autocomplete="off" spellcheck="false" />
  </div>
  <div class="filter-scroll" id="filterGroup">
    <button class="pill active" data-rarity="all">All</button>
    <button class="pill" data-sort="price" id="sortPrice">💰 Most Expensive</button>
    <button class="pill" data-sort="views" id="sortViews">🔥 Most Viewed</button>
    <span style="width:1px;height:24px;background:var(--border2);flex-shrink:0;align-self:center"></span>
    <button class="pill" data-rarity="C">Common</button>
    <button class="pill" data-rarity="R">Rare</button>
    <button class="pill" data-rarity="RS">Rising Star</button>
    <button class="pill" data-rarity="SSR">SSR</button>
    <button class="pill" data-rarity="UR">Ultra Rare</button>
    <button class="pill" data-rarity="SP">Special</button>
    <button class="pill" data-rarity="AR">AR</button>
    <button class="pill" data-rarity="QR">QR</button>
    <button class="pill" data-rarity="TR">Trainer</button>
  </div>
</div>

<div class="result-bar" id="resultBar"></div>
<div class="grid" id="grid"></div>
</div><!-- /collectionView -->

<div id="leaderboardView">
  <div class="lb-header">Most viewed cards · all time</div>
  <div class="lb-list" id="lbList"></div>
</div>

<div class="backdrop" id="backdrop">
  <div class="sheet" id="sheet">
    <div class="drag-handle"></div>
    <button class="sheet-close" id="closeBtn" aria-label="Close">✕</button>
    <div class="sheet-img-wrap">
      <img id="sheetImg" src="" alt="" />
      <div class="sheet-line" id="sheetLine"></div>
    </div>
    <div class="sheet-body">
      <div style="margin-top:16px">
        <div class="sheet-rarity-badge" id="sheetBadge"></div>
        <div class="sheet-hero" id="sheetHero"></div>
        <div class="sheet-skin" id="sheetSkin"></div>
      </div>
      <div class="sheet-divider"></div>
      <div class="sheet-meta" id="sheetMeta"></div>
    </div>
  </div>
</div>

<script>
  const RC = { C:'#8892aa',R:'#4b9fff',RS:'#9b6df0',SSR:'#ff6b35',UR:'#f5c842',SP:'#ff4b8b',AR:'#00e5c8',QR:'#ff80c8',TR:'#66bb6a' };
  const RT = { C:'#07080f',R:'#fff',RS:'#fff',SSR:'#fff',UR:'#07080f',SP:'#fff',AR:'#07080f',QR:'#07080f',TR:'#07080f' };

  // Set this to your deployed worker URL after `wrangler deploy`
  const WORKER_URL = 'https://ml-cards-worker.holiday-radar-api.workers.dev';
  const TIKTOK_WORKER_URL = 'https://tiktok-live-worker.holiday-radar-api.workers.dev';

  const TIKTOK_ACCOUNTS = [
    { username: 'nocap.tcg',              display: 'NoCap TCG', country: 'MY' },
    { username: '3brotherstcg',           display: '3 Brothers TCG', country: 'MY' },
    { username: 'assemble.tcg',           display: 'Assemble TCG', country: 'MY' },
    { username: 'tylorcollectible',       display: 'Tylor Collectible', country: 'MY' },
    { username: 'kctcg53',                display: 'KC TCG', country: 'MY' },
    { username: 'metarealms13',           display: 'Meta Realms', country: 'MY' },
    { username: 'metalab13',              display: 'MetaLab 13', country: 'MY' },
    { username: 'mlbbccg',                display: 'MLBB CCG', country: 'MY' },
    { username: 'knight_collectibles09', display: 'Knight Collectibles', country: 'MY' },
    { username: 'vortexempirex',          display: 'Vortex Empire', country: 'MY' },
    { username: 'pocketfarms',            display: 'PocketFarms', country: 'SG' },
    { username: 'mamakshop49',            display: 'KihuatBreaks', country: 'SG' },
    { username: 'kc.rips',                display: 'KC Rips', country: 'SG' },
    { username: 'tumbukpringle2',         display: 'TumbukPringle', country: 'SG' },
  ];

  // In-memory view counts populated from the worker on load
  let allViews = {};

  function getViewCount(id) {
    return allViews[id] || 0;
  }

  async function trackView(id) {
    allViews[id] = (allViews[id] || 0) + 1; // optimistic update
    try {
      const res = await fetch(`${WORKER_URL}/view`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ id }),
      });
      if (res.ok) {
        const data = await res.json();
        allViews[id] = data.count; // sync with server truth
      }
    } catch { /* offline or worker unavailable — optimistic count stands */ }
  }

  async function loadViews() {
    try {
      const res = await fetch(`${WORKER_URL}/views`);
      if (res.ok) allViews = await res.json();
    } catch { /* fall back to empty counts */ }
  }

  let allCards = [];
  let activeRarity = 'all';
  let searchQuery = '';
  let sortByPrice = false;
  let sortByViews = false;

  function getFiltered() {
    let result = allCards.filter(c => {
      const matchR = activeRarity === 'all' || c.rarity === activeRarity;
      const q = searchQuery.toLowerCase();
      const matchS = !q || c.skin.toLowerCase().includes(q) || c.id.toLowerCase().includes(q) || c.hero.toLowerCase().includes(q);
      return matchR && matchS;
    });
    if (sortByPrice) {
      result = result.slice().sort((a, b) => (b.priceSGD || 0) - (a.priceSGD || 0));
    } else if (sortByViews) {
      result = result.slice().sort((a, b) => getViewCount(b.id) - getViewCount(a.id));
    }
    return result;
  }

  function render() {
    const filtered = getFiltered();
    document.getElementById('resultBar').textContent =
      filtered.length === allCards.length
        ? `${allCards.length} cards`
        : `Showing ${filtered.length} of ${allCards.length}`;

    const grid = document.getElementById('grid');
    if (!filtered.length) {
      grid.innerHTML = '<div class="empty"><div class="empty-icon">🔍</div><p>No cards match your search.</p></div>';
      return;
    }

    grid.innerHTML = filtered.map(c => {
      const views = getViewCount(c.id);
      return `
      <div class="card" data-id="${c.id}" data-rarity="${c.rarity}" role="button" tabindex="0" aria-label="${c.skin}">
        <div class="card-img">
          <span class="rarity-pill rarity-${c.rarity}">${c.rarity}</span>
          <img src="images/${c.file}" alt="${c.skin}" loading="lazy" decoding="async" />
          <div class="card-label">
            <div class="card-skin">${c.skin}</div>
            <div class="card-id">${c.hero} · ${c.id}</div>
            ${c.priceUSD ? `<div class="card-price">$${c.priceUSD.toFixed(2)}</div>` : (c.priceSGD ? `<div class="card-price">$${(c.priceSGD * 0.74).toFixed(2)}</div>` : '')}
          </div>
          ${views > 0 ? `<div class="view-badge">👁 ${views}</div>` : ''}
        </div>
      </div>`;
    }).join('');

    grid.querySelectorAll('.card').forEach(el => {
      el.addEventListener('click', () => openSheet(el.dataset.id));
      el.addEventListener('keydown', e => { if (e.key==='Enter'||e.key===' ') openSheet(el.dataset.id); });
    });
  }

  function openSheet(id) {
    const c = allCards.find(x => x.id === id);
    if (!c) return;
    trackView(id).then(() => render()); // refresh grid after server confirms count
    const col = RC[c.rarity] || '#fff';
    const tc  = RT[c.rarity] || '#fff';
    document.getElementById('sheetImg').src = `images/${c.file}`;
    document.getElementById('sheetImg').alt = c.skin;
    document.getElementById('sheetLine').style.background = col;
    document.getElementById('sheetBadge').textContent = `${c.rarity} · ${c.rarityLabel}`;
    document.getElementById('sheetBadge').style.cssText = `background:${col}22;border:1px solid ${col}55;color:${col}`;
    document.getElementById('sheetHero').textContent = c.hero;
    document.getElementById('sheetSkin').textContent = c.skin;
    document.getElementById('sheetMeta').innerHTML = `
      <div class="meta-tile">
        <div class="tile-label">Card ID</div>
        <div class="tile-val" style="font-family:monospace;font-size:12px">${c.id}</div>
      </div>
      <div class="meta-tile">
        <div class="tile-label">Rarity</div>
        <div class="tile-val" style="color:${col}">${c.rarity}</div>
      </div>
      <div class="meta-tile">
        <div class="tile-label">Price (USD)</div>
        <div class="tile-val" style="color:#4caf50">${c.priceUSD ? '$' + c.priceUSD.toFixed(2) : (c.priceSGD ? '$' + (c.priceSGD * 0.74).toFixed(2) : 'N/A')}</div>
      </div>
      <div class="meta-tile">
        <div class="tile-label">Rarity Tier</div>
        <div class="tile-val">${c.rarityLabel}</div>
      </div>
      <div class="meta-tile">
        <div class="tile-label">Times Viewed</div>
        <div class="tile-val">👁 ${getViewCount(c.id)}</div>
      </div>`;
    document.getElementById('backdrop').classList.add('open');
    document.getElementById('sheet').scrollTop = 0;
    document.body.style.overflow = 'hidden';
  }

  function closeSheet() {
    document.getElementById('backdrop').classList.remove('open');
    document.body.style.overflow = '';
  }

  /* ── Leaderboard ── */
  function renderLeaderboard() {
    const lbList = document.getElementById('lbList');
    const ranked = allCards
      .map(c => ({ ...c, views: getViewCount(c.id) }))
      .filter(c => c.views > 0)
      .sort((a, b) => b.views - a.views);

    if (!ranked.length) {
      lbList.innerHTML = '<div class="lb-empty"><div class="lb-empty-icon">👁</div><p>No views yet — browse some cards!</p></div>';
      return;
    }

    const maxViews = ranked[0].views;
    const rankIcon = ['🥇','🥈','🥉'];

    lbList.innerHTML = ranked.map((c, i) => {
      const col = RC[c.rarity] || '#fff';
      const barPct = Math.round((c.views / maxViews) * 100);
      const rankLabel = i < 3 ? rankIcon[i] : `#${i + 1}`;
      const rankClass = i === 0 ? 'top1' : i === 1 ? 'top2' : i === 2 ? 'top3' : '';
      return `
        <div class="lb-row" data-id="${c.id}" data-rarity="${c.rarity}" role="button" tabindex="0" aria-label="${c.skin}">
          <div class="lb-rank ${rankClass}">${rankLabel}</div>
          <div class="lb-thumb"><img src="images/${c.file}" alt="${c.skin}" loading="lazy" /></div>
          <div class="lb-info">
            <div class="lb-skin">${c.skin}</div>
            <div class="lb-hero">
              <span class="lb-rarity-dot" style="background:${col}"></span>${c.hero} · <span style="color:${col}">${c.rarity}</span>
            </div>
            <div class="lb-bar-wrap">
              <div class="lb-bar" style="width:${barPct}%;background:${col}"></div>
            </div>
          </div>
          <div class="lb-right">
            <div class="lb-count">${c.views}</div>
            <div class="lb-count-label">views</div>
          </div>
        </div>`;
    }).join('');

    lbList.querySelectorAll('.lb-row').forEach(el => {
      el.addEventListener('click', () => openSheet(el.dataset.id));
      el.addEventListener('keydown', e => { if (e.key==='Enter'||e.key===' ') openSheet(el.dataset.id); });
    });
  }

  let liveRefreshTimer = null;

  function showTab(tab) {
    const isLb = tab === 'leaderboard';
    const isLive = tab === 'live';
    document.getElementById('collectionView').style.display = (isLb || isLive) ? 'none' : '';
    document.getElementById('leaderboardView').classList.toggle('visible', isLb);
    document.getElementById('liveView').classList.toggle('visible', isLive);
    document.getElementById('tabLive').classList.toggle('active', isLive);
    document.getElementById('tabCollection').classList.toggle('active', !isLb && !isLive);
    document.getElementById('tabLeaderboard').classList.toggle('active', isLb);
    if (isLb) renderLeaderboard();
    if (isLive) {
      loadAndRenderLive();
      clearInterval(liveRefreshTimer);
      liveRefreshTimer = setInterval(loadAndRenderLive, 2 * 60 * 1000);
    } else {
      clearInterval(liveRefreshTimer);
    }
  }

  /* ── TikTok Live ── */
  function statusBadge(live) {
    if (live === true)  return '<span class="live-badge"><span class="dot"></span>Live</span>';
    if (live === false) return '<span class="offline-badge">⚫ Offline</span>';
    return '<span class="unknown-badge">? Unknown</span>';
  }

  function regionFlag(region) {
    if (!region) return '';
    // Convert ISO 3166-1 alpha-2 code to flag emoji (regional indicator symbols)
    return region.toUpperCase().replace(/./g, c =>
      String.fromCodePoint(0x1F1E6 - 65 + c.charCodeAt(0))
    );
  }

  function renderLiveTiles(statusMap) {
    const grid = document.getElementById('liveGrid');
    const sorted = [...TIKTOK_ACCOUNTS].sort((a, b) => {
      const la = statusMap[a.username]?.live;
      const lb = statusMap[b.username]?.live;
      if (la === true && lb !== true) return -1;
      if (lb === true && la !== true) return 1;
      return 0;
    });
    grid.innerHTML = sorted.map(({ username, display, country }) => {
      const status = statusMap[username];
      const live = status ? status.live : null;
      const flag = regionFlag(status?.region || country);
      return `
        <div class="tt-tile">
          <a href="https://www.tiktok.com/@${username}/live" target="_blank" rel="noopener noreferrer">
            <div class="tt-avatar">🌄</div>
            <div class="tt-name">${display}${flag ? ` <span class="tt-flag">${flag}</span>` : ''}</div>
            <div class="tt-handle">@${username}</div>
            <div class="tt-status">${statusBadge(live)}</div>
          </a>
        </div>`;
    }).join('');
  }

  async function loadAndRenderLive() {
    const bar = document.getElementById('liveRefreshBar');
    bar.textContent = 'Checking status…';
    renderLiveTiles({});
    try {
      const usernames = TIKTOK_ACCOUNTS.map(a => a.username).join(',');
      const res = await fetch(`${TIKTOK_WORKER_URL}/live-status?usernames=${usernames}`);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const statusMap = await res.json();
      renderLiveTiles(statusMap);
      const liveCount = Object.values(statusMap).filter(s => s.live === true).length;
      const now = new Date().toLocaleTimeString('en-SG', { hour: '2-digit', minute: '2-digit' });
      bar.textContent = `${liveCount} live now · last checked ${now} · auto-refreshes every 2 min`;
    } catch (e) {
      bar.textContent = `Could not fetch live status (${e.message})`;
      renderLiveTiles({});
    }
  }

  document.getElementById('tabLive').addEventListener('click', () => showTab('live'));
  document.getElementById('tabCollection').addEventListener('click', () => showTab('collection'));
  document.getElementById('tabLeaderboard').addEventListener('click', () => showTab('leaderboard'));

  document.getElementById('filterGroup').addEventListener('click', e => {
    const btn = e.target.closest('.pill');
    if (!btn) return;
    if (btn.dataset.sort === 'price') {
      sortByPrice = !sortByPrice;
      sortByViews = false;
      btn.classList.toggle('active', sortByPrice);
      document.getElementById('sortViews').classList.remove('active');
      render();
      return;
    }
    if (btn.dataset.sort === 'views') {
      sortByViews = !sortByViews;
      sortByPrice = false;
      btn.classList.toggle('active', sortByViews);
      document.getElementById('sortPrice').classList.remove('active');
      render();
      return;
    }
    document.querySelectorAll('.pill[data-rarity]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeRarity = btn.dataset.rarity;
    render();
  });

  let t;
  document.getElementById('search').addEventListener('input', e => {
    clearTimeout(t);
    t = setTimeout(() => { searchQuery = e.target.value; render(); }, 120);
  });

  document.getElementById('closeBtn').addEventListener('click', closeSheet);
  document.getElementById('backdrop').addEventListener('click', e => {
    if (e.target === document.getElementById('backdrop')) closeSheet();
  });
  document.addEventListener('keydown', e => { if (e.key==='Escape') closeSheet(); });

  (async () => {
    const [data] = await Promise.all([
      fetch('data.json', { cache: 'no-store' }).then(r => r.json()),
      loadViews(),
    ]);
    allCards = data.cards;
    const heroes = new Set(allCards.map(c => c.hero));
    const rarities = new Set(allCards.map(c => c.rarity));
    document.getElementById('statCards').textContent = allCards.length;
    document.getElementById('statRarities').textContent = rarities.size;
    document.getElementById('statHeroes').textContent = heroes.size;
    if (data.lastUpdated) {
      const d = new Date(data.lastUpdated);
      const fmt = d.toLocaleString('en-SG', { timeZone: 'Asia/Singapore', day: 'numeric', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit', hour12: true });
      document.getElementById('heroUpdated').textContent = `Prices updated ${fmt} SGT`;
    }
    showTab('live');
    render();
  })();
</script>
